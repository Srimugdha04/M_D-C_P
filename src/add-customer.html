<body>

  <!-- TOPBAR -->

    <button id="mobileBtn" class="btn btn-light btn-icon btn-sm d-lg-none me-2">
      <i class="ti ti-layout-sidebar-left-expand"></i>
    </button>
    <div>
      <!-- Navbar nav -->

    </div>

  </nav>

  <!-- SIDEBAR -->
  <aside id="sidebar" class="sidebar">
    <div class="logo-area">
      <a href="index.html" class="d-inline-flex" style="text-decoration:none;">
        <span style="font-size:1.4rem; font-weight:800; color:#4F46E5; letter-spacing:0.5px;">
          <i class="ti ti-chart-arcs" style="font-size:1.6rem; vertical-align:middle; margin-right:4px;"></i>CHURN PREDICTOR

    <ul class="nav flex-column">

      <li><a class="nav-link active" href="index.html"><i class="ti ti-home"></i><span

            class="nav-text">Churn Dashboard</span></a></li>
      <li><a class="nav-link" href="create-product.html"><i class="ti ti-plus"></i><span class="nav-text">Predict Customer</span></a></li>

      <li><a class="nav-link" href="docs.html"><i class="ti ti-file-text"></i><span class="nav-text">Docs</span></a></li>


    </ul>

  <!-- MAIN CONTENT -->
  <main id="content" class="content py-10">
    <div class="container-fluid">
      <div class="row">
        <div class="col-12">
          <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center mb-4 gap-3">
            <div class="">
              <h1 class="fs-3 mb-1">Run Churn Prediction</h1>
              <p class="mb-0">Identify users likely to leave</p>
            </div>
            <div>
              <a href="inventory.html" class="btn btn-primary">Go to Inventory List</a>
            </div>
          </div>
        </div>
      </div>
      <div class="row"> 
  <div class="col-12">
    <div class="card">
      <div class="card-body p-4">

        <h4 class="mb-4">➕ Add New Customer</h4>

        <form id="addForm">
          <div class="row">
            <div class="col-md-6 mb-3">
              <label class="form-label">Customer Name</label>
              <input type="text" class="form-control" id="custName" placeholder="e.g., John Doe" required>
            </div>
          </div>
          <div class="row">
            <div class="col-md-6 mb-3">
              <label class="form-label">Credit Score</label>
              <input type="number" class="form-control" id="credit" placeholder="e.g., 650 (range: 300–850)" required>
            </div>

            <div class="col-md-6 mb-3">
              <label class="form-label">Age</label>
              <input type="number" class="form-control" id="age" placeholder="e.g., 35" required>
            </div>
          </div>

          <div class="row">
            <div class="col-md-6 mb-3">
              <label class="form-label">Balance</label>
              <input type="number" class="form-control" id="balance" placeholder="e.g., 25,000" required>
            </div>

            <div class="col-md-6 mb-3">
              <label class="form-label">Salary</label>
              <input type="number" class="form-control" id="salary" placeholder="e.g., 7,50,000" required>
            </div>
          </div>
          <div class="row">
  <div class="col-md-6 mb-3">
    <label>Tenure (years)</label>
    <input type="number" id="tenure" class="form-control" placeholder="e.g., 5" required>
  </div>

  <div class="col-md-6 mb-3">
    <label>Number of Products</label>
    <input type="number" id="products" class="form-control" placeholder="e.g., 2" required>
  </div>

  <div class="col-md-6 mb-3">
    <label>Has Credit Card (0/1)</label>
    <input type="number" id="creditCard" class="form-control" placeholder="0 = No, 1 = Yes" required>
  </div>

  <div class="col-md-6 mb-3">
    <label>Is Active Member (0/1)</label>
    <input type="number" id="activeMember" class="form-control" placeholder="0 = No, 1 = Yes" required>
  </div>

  <div class="col-md-6 mb-3">
    <label>Estimated Transactions</label>
    <input type="number" id="transactions" class="form-control" placeholder="e.g., 120" required>
  </div>

  <div class="col-md-6 mb-3">
    <label>Complaints Count</label>
    <input type="number" id="complaints" class="form-control" placeholder="e.g., 4" required>
  </div>
</div>
          <div class="d-flex justify-content-end gap-2 mt-3">
              <button type="button" id="addBtn" class="btn btn-success px-4" onclick="addCustomerData()">
                Add Details
              </button>
            </div>
            
        <script>
            function addCustomerData() {
                const user = JSON.parse(localStorage.getItem('user') || '{}');
                const btn = document.getElementById('addBtn');
                btn.innerHTML = '<i class="ti ti-loader ti-spin"></i> Adding...';
                
                fetch('/api/add_customer', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        user: user,
                        name: document.getElementById('custName').value || 'Anonymous',
                        credit: document.getElementById('credit').value,
                        age: document.getElementById('age').value,
                        balance: document.getElementById('balance').value,
                        salary: document.getElementById('salary').value,
                        tenure: document.getElementById('tenure').value,
                        products: document.getElementById('products').value,
                        creditCard: document.getElementById('creditCard').value,
                        activeMember: document.getElementById('activeMember').value,
                        transactions: document.getElementById('transactions').value,
                        complaints: document.getElementById('complaints').value
                    })
                }).then(r => r.json()).then(res => {
                    alert(res.message);
                    window.location.href = 'inventory.html';
                }).catch(e => {
                    alert("Failed to add customer");
                    btn.innerHTML = 'Add Details';
                });
            }
        </script>

        </form>


    </div>
  </div>
</div>

    </div>
  </main>

  <!-- Bootstrap JS -->
  <script src="./assets/js/main.js" type="module"></script>



</body>

</html>
